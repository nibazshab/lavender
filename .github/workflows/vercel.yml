name: vercel

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true

      - run: cargo build --verbose --release 

      - run: |
          mkdir dist
          tar czf dist/webnote-linux-amd64.tar.gz -C target/release webnote
